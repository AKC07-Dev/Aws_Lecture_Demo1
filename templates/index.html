<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
            text-align:center;
        }

        h1{
            color:#007BFF;
            margin-bottom:10px;
        }

        p{
            color:#555;
            font-size:18px;
        }

        button{
            margin-top:20px;
            padding:10px 20px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Welcome to My Flask Website!</h1>
    <p>Your Flask application is running successfully.</p>

    <button onclick="alert('Hello! Flask is working.')">
        Click Me
    </button>
</div>

</body>
</html>
