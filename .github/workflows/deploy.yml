name: Deploy Flask to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/Aws_Lecture_Demo1

            echo "Pulling latest code..."
            git pull

            echo "Stopping old Flask application..."
            ps -ef | grep "python app.py" | grep -v grep | awk '{print $2}' | xargs -r kill -9

            echo "Starting Flask application..."
            nohup ~/Aws_Lecture_Demo1/venv/bin/python app.py > flask.log 2>&1 < /dev/null &

            sleep 5

            echo "Checking if Flask is running..."
            pgrep -f app.py

            echo "Deployment completed successfully."

            exit 0
